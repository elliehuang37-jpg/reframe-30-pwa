<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>語言的魔力 · 30 天換框練習</title>
<meta name="description" content="依據 Robert Dilts《Sleight of Mouth》14 種語言魔術模式，設計的 30 天每日換框練習。">
<meta name="theme-color" content="#4213A9">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="換框練習">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-label="語言的魔力">
          <svg viewBox="0 0 64 64" width="22" height="22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#ffffff" fill-rule="evenodd" d="M16 12 H48 a8 8 0 0 1 8 8 V32 a8 8 0 0 1 -8 8 H28 L18 50 L24 40 H16 a8 8 0 0 1 -8 -8 V20 a8 8 0 0 1 8 -8 Z M32 16 C33.4 23 35.2 24.8 42 26 C35.2 27.2 33.4 29 32 36 C30.6 29 28.8 27.2 22 26 C28.8 24.8 30.6 23 32 16 Z"/>
          </svg>
        </div>
        <div>
          <h1>語言的魔力</h1>
          <div class="sub">30 DAYS OF REFRAMING · SLEIGHT OF MOUTH</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-meta">
          <span>已完成 <b id="progressDone">0</b> / 30 天</span>
          <span><b id="progressPct">0%</b></span>
        </div>
      </div>
    </header>

    <main id="view"><!-- 動態內容 --></main>
  </div>

  <nav class="tabbar">
    <button class="tab active" data-tab="day"><span class="tico">📖</span>今日</button>
    <button class="tab" data-tab="calendar"><span class="tico">🗓️</span>旅程</button>
    <button class="tab" data-tab="reference"><span class="tico">✦</span>14式</button>
    <button class="tab" data-tab="stats"><span class="tico">🌱</span>我的</button>
  </nav>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
